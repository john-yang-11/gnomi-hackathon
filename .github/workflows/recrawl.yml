name: Recrawl

# Drains whatever pg_cron has re-enqueued (stale articles) by running the crawler.
#
# MANUAL by default — trigger it from the GitHub "Actions" tab when you want.
# To make the recrawl loop fully automatic, uncomment the `schedule:` block
# below; paired with the pg_cron job it becomes hands-off (no server needed).

on:
  workflow_dispatch:           # run on-demand from the GitHub UI
  # schedule:
  #   - cron: "15 * * * *"     # uncomment to auto-run hourly (after pg_cron's :00 re-enqueue)

jobs:
  recrawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # safety cap so a hung run can't run forever
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recrawl pending URLs
        env:
          # Provided by the repo secret you add (Settings → Secrets → Actions)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py --resume --limit 50
